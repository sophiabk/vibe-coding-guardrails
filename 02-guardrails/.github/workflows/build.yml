# Reusable workflow: produce a Next.js production build.
# Uses placeholder secrets so the build can run without real credentials.

name: Build

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: 20.x
          cache: "npm"

      - name: Enable corepack and set Yarn version
        run: |
          corepack enable
          corepack prepare yarn@stable --activate
          yarn --version

      - name: Run install
        uses: borales/actions-yarn/@v4
        with:
          cmd: install
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Run Build
        run: NODE_OPTIONS="--max-old-space-size=4096" yarn build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          IS_BUILDING_APP: true
          OPENAI_API_KEY: placeholder
          STRIPE_SECRET_KEY: placeholder
