name: Playwright Tests

# End-to-end browser tests. Runs only on PRs to main (the last gate before prod).
# Spins up a throwaway Postgres as a service container — no external DB needed.

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres?schema=public"
      NEXT_PUBLIC_ENABLE_FEATURE_X: 1
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
          # Health checks so steps wait until Postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          # Maps tcp port 5432 on the service container to the host
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - name: Enable corepack and set Yarn version
        run: |
          corepack enable
          corepack prepare yarn@stable --activate
          yarn --version
      - name: Run install
        uses: borales/actions-yarn/@v4
        with:
          cmd: install
        env:
          NEXT_TELEMETRY_DISABLED: 1
      - name: Install Playwright Browsers
        uses: borales/actions-yarn/@v4
        with:
          cmd: playwright install --with-deps
      - name: Run migrations
        uses: borales/actions-yarn/@v4
        with:
          cmd: prisma migrate dev
        env:
          NEXT_TELEMETRY_DISABLED: 1
          OPENAI_API_KEY: "placeholder"
      - name: Run Playwright tests
        uses: borales/actions-yarn/@v4
        with:
          cmd: playwright test
        env:
          AUTH_SECRET: secret
          # A dedicated CI-only password lets tests log in via a hidden field
          # that is only rendered when the flag below is set. Set the real value
          # as a GitHub Secret rather than committing it.
          CI_TEST_PASSWORD: ${{ secrets.CI_TEST_PASSWORD }}
          NEXT_PUBLIC_ENABLE_CI_TEST_PASSWORD_FIELD: true
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
